# STUB — replace with the real backend contract.
openapi: 3.1.0
info:
  title: {PROJECT_NAME} backend API
  version: 0.0.0
paths:
  /me:
    get:
      responses:
        '200':
          description: current user
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: integer }
                  email: { type: string }
                required: [id, email]
  /users:
    get:
      responses:
        '200':
          description: user list
  /login:
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email: { type: string }
                password: { type: string }
              required: [email, password]
      responses:
        '200':
          description: credentials valid — returns the backend access token
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: integer }
                  email: { type: string }
                  token: { type: string }
                required: [id, email, token]
