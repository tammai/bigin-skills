name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go vet ./...
      - run: go build -o bin/server ./cmd/server
      - run: go test ./...
      - uses: dominikh/staticcheck-action@v1
        with:
          version: "latest"
